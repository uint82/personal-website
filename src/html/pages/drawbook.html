<div class="page" data-page="drawbook">
  <div class="widget">
    <div class="widget-header">
      <h2 class="widget-title"><i class="fa-solid fa-palette"></i> DrawBook</h2>
    </div>
    <div class="widget-content">
      <div class="drawbook-container">

        <div class="canvas-wrapper">
          <div class="canvas-stage">
            <canvas id="drawbook-canvas" width="700" height="500"></canvas>
            <div id="symmetry-overlay" class="symmetry-overlay" data-sym="none"></div>
          </div>
        </div>

        <div class="controls-section">

          <div class="control-group">
            <label>Tool</label>
            <div class="button-group tools-toggle">
              <button id="tool-brush" class="control-btn active" title="Brush (B)">
                <i class="fa-solid fa-paintbrush"></i>
              </button>
              <button id="tool-eraser" class="control-btn" title="Eraser (E)">
                <i class="fa-solid fa-eraser"></i>
              </button>
              <button id="tool-fill" class="control-btn" title="Fill / Paint Bucket (F)">
                <i class="fa-solid fa-fill-drip"></i>
              </button>
              <button id="tool-spray" class="control-btn" title="Spray / Airbrush (A)">
                <i class="fa-solid fa-spray-can-sparkles"></i>
              </button>
              <button id="tool-shape" class="control-btn" title="Shapes (S)">
                <i class="fa-solid fa-shapes"></i>
              </button>
            </div>
          </div>

          <div id="shape-picker" class="control-group" hidden>
            <label>Shape</label>
            <div class="button-group tools-toggle shape-toggle">
              <button id="shape-line" class="control-btn" title="Line">
                <i class="fa-solid fa-minus"></i>
              </button>
              <button id="shape-rect" class="control-btn active" title="Rectangle">
                <i class="fa-regular fa-square"></i>
              </button>
              <button id="shape-circle" class="control-btn" title="Circle / Ellipse">
                <i class="fa-regular fa-circle"></i>
              </button>
              <button id="shape-triangle" class="control-btn" title="Triangle">
                <i class="fa-solid fa-play" style="transform: rotate(-90deg)"></i>
              </button>
            </div>
          </div>

          <div class="control-group">
            <label>Color</label>
            <div id="color-picker"></div>
            <label for="brush-width" style="margin-left: 12px;">Width <span id="width-value">3</span>px</label>
            <input type="range" id="brush-width" min="1" max="120" value="3" />
          </div>

          <div class="control-group">
            <label for="opacity-slider">Opacity <span id="opacity-value">100</span>%</label>
            <input type="range" id="opacity-slider" min="1" max="100" value="100" />
            <label for="blend-mode" style="margin-left: 12px;">Blend</label>
            <select id="blend-mode" class="blend-select">
              <option value="source-over">Normal</option>
              <option value="multiply">Multiply</option>
              <option value="screen">Screen</option>
              <option value="overlay">Overlay</option>
              <option value="darken">Darken</option>
              <option value="lighten">Lighten</option>
              <option value="color-dodge">Dodge</option>
              <option value="color-burn">Burn</option>
            </select>
          </div>

          <div class="control-group">
            <label>Mirror</label>
            <div class="button-group tools-toggle sym-toggle">
              <button id="sym-none" class="control-btn active" title="No symmetry">Off</button>
              <button id="sym-h" class="control-btn" title="Mirror left ↔ right">H</button>
              <button id="sym-v" class="control-btn" title="Mirror top ↕ bottom">V</button>
              <button id="sym-both" class="control-btn" title="Mirror both axes">✕</button>
            </div>
          </div>

          <div class="button-group actions-group">
            <button id="undo-btn" class="control-btn" title="Undo (Ctrl+Z)">
              <i class="fa-solid fa-rotate-left"></i>
            </button>
            <button id="redo-btn" class="control-btn" title="Redo (Ctrl+Y)">
              <i class="fa-solid fa-rotate-right"></i>
            </button>
            <button id="clear-btn" class="control-btn" title="Clear canvas">
              <i class="fa-solid fa-trash-can"></i>
            </button>
            <button id="download-btn" class="control-btn" title="Download PNG (Ctrl+S)">
              <i class="fa-solid fa-download"></i>
            </button>
            <button id="submit-btn" class="control-btn primary">Submit</button>
          </div>

          <div id="upload-status" class="upload-status"></div>

          <div class="shortcut-hint">
            <span><kbd>B</kbd> Brush</span>
            <span><kbd>E</kbd> Eraser</span>
            <span><kbd>F</kbd> Fill</span>
            <span><kbd>A</kbd> Spray</span>
            <span><kbd>S</kbd> Shape</span>
            <span><kbd>[</kbd><kbd>]</kbd> Width</span>
            <span><kbd>Ctrl</kbd>+<kbd>Z/Y</kbd> Undo/Redo</span>
          </div>
        </div>
      </div>

      <div class="gallery-section">
        <h3>Website Gallery</h3>
        <div id="drawing-gallery" class="drawing-gallery">
          <p class="loading">Loading drawings...</p>
        </div>
      </div>
    </div>
  </div>

  <div id="lightbox" class="lightbox hidden">
    <button id="lightbox-close" class="lightbox-btn close-btn">
      <i class="fa-solid fa-xmark"></i>
    </button>
    <button id="lightbox-prev" class="lightbox-btn nav-btn prev-btn">
      <i class="fa-solid fa-chevron-left"></i>
    </button>

    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="Inspected Drawing" />
      <p id="lightbox-timestamp" class="timestamp"></p>
    </div>

    <button id="lightbox-next" class="lightbox-btn nav-btn next-btn">
      <i class="fa-solid fa-chevron-right"></i>
    </button>
  </div>
</div>
